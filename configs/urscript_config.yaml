# ============================================================
#  Mode 1 — URScript + Robotiq 2F-58 + Intel D435i
#  Edit the values below to match your setup.
# ============================================================

robot:
  host: "169.254.175.10"       # UR7e controller IP address
  frequency: 500.0             # RTDE receive frequency (Hz)

gripper:
  port: 63352                  # Robotiq URCap socket port (default: 63352)
  type: "robotiq_2f58"

cameras:
  # Single-camera setup. To add a second D435i, copy this block and give
  # both `name` and `serial` distinct values.
  - name: cam_external_1
    serial: ""                 # Empty = use first available D435i.
                               # To pin to a specific camera, run
                               #   python preview_cameras.py
                               # and paste its serial number here.
    width: 640
    height: 480
    fps: 30
    enable_depth: false        # Set true to also capture depth frames

collection:
  fps: 30                      # Recording frame rate (must be <= camera fps)
  output_dir: "datasets"       # Root folder for saved datasets
  dataset_name: "auto_con_demo"
